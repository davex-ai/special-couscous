name: Hephaestus Oracle

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */6 * * *"
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install numpy

      - run: python generator.py

      - name: Commit
        run: |
          git config --global user.name "Aetna (Hephaestus Assist)"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Evolving cs cs update $(date)" || echo "no change"
          git push
