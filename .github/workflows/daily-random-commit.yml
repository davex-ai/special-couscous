name: Daily Random Commit

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate random code
        run: |
          echo "// random code $(date)" >> random_code.js
          echo "const num = $RANDOM;" >> random_code.js
          echo "console.log(num);" >> random_code.js
          echo "" >> random_code.js

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "auto: random code $(date)" || echo "no changes"
          git push
