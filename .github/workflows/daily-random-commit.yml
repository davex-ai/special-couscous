name: Daily Random Commit PR Flow

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  commit-pr-merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Authenticate gh
        run: echo "${{ secrets.GH_PAT }}" | gh auth login --with-token

      - name: Configure git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare counter
        id: counter
        run: |
          git checkout main
          git pull origin main

          if [ ! -f .auto-branch-counter ]; then
            echo "0" > .auto-branch-counter
          fi

          CURRENT=$(cat .auto-branch-counter)
          NEXT=$((CURRENT + 1))

          if [ "$NEXT" -gt 5 ]; then
            NEXT=1
          fi

          echo "$NEXT" > .auto-branch-counter
          echo "branch_name=auto/random-$NEXT" >> $GITHUB_OUTPUT
          echo "branch_num=$NEXT" >> $GITHUB_OUTPUT

      - name: Commit counter update
        run: |
          git add .auto-branch-counter
          git commit -m "chore: update auto branch counter" || echo "no changes"
          git push origin main

      - name: Create branch
        run: |
          git checkout -B "${{ steps.counter.outputs.branch_name }}"

      - name: Generate random code
        run: |
          echo "// random code $(date)" >> random_code.js
          echo "const num = $RANDOM;" >> random_code.js
          echo "console.log(num);" >> random_code.js
          echo "" >> random_code.js

      - name: Commit and push branch
        run: |
          git add random_code.js
          git commit -m "auto: random code $(date +'%Y-%m-%d %H:%M')" || echo "no changes"
          git push origin "${{ steps.counter.outputs.branch_name }}" --force

      - name: Create PR
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.counter.outputs.branch_name }}" \
            --title "Auto PR: random code update #${{ steps.counter.outputs.branch_num }}" \
            --body "Automated random code update from GitHub Actions."

      - name: Merge PR and delete branch
        run: |
          gh pr merge "${{ steps.counter.outputs.branch_name }}" --squash --delete-branch
